services:
  app:
    build: .
    ports:
      - "3007:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/drop2
      - PORT=3000
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "3006:5173"
    environment:
      - VITE_API_TARGET=http://app:3000
      - VITE_SOCKET_URL=http://localhost:3007
    depends_on:
      - app

  mongo:
    image: mongo:4.4
    container_name: drop2-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - drop2-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  drop2-mongo-data:
